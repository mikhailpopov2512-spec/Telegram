name: Build Telegram Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject API_ID and API_HASH
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          sed -i "s/API_ID = 0;/API_ID = $API_ID;/g" TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          sed -i "s/API_HASH = \"\";/API_HASH = \"$API_HASH\";/g" TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-debug-apk
          path: TMessagesProj/build/outputs/apk/debug/*.apk
